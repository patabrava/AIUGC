x-flow-forge-base: &flow-forge-base
  image: python:3.11-slim
  restart: unless-stopped
  environment: *flow-forge-env

services:
  web:
    <<: *flow-forge-base
    command:
      - sh
      - -lc
      - |
        set -eu
        export DEBIAN_FRONTEND=noninteractive
        if ! command -v git >/dev/null 2>&1 || ! command -v ffmpeg >/dev/null 2>&1; then
          apt-get update -o Acquire::Retries=3
          apt-get install -y --no-install-recommends ca-certificates ffmpeg git
          rm -rf /var/lib/apt/lists/*
        fi
        repo_url="${DOCKER_BUILD_CONTEXT%%#*}"
        repo_ref=""
        if [ "$repo_url" != "$DOCKER_BUILD_CONTEXT" ]; then
          repo_ref="${DOCKER_BUILD_CONTEXT#*#}"
        fi
        if [ ! -d /app/.git ]; then
          rm -rf /app
          git clone --depth 1 "$repo_url" /app
        fi
        cd /app
        if [ -n "$repo_ref" ]; then
          git fetch --depth 1 origin "$repo_ref"
          git checkout -f "$repo_ref"
        fi
        python -m pip install --upgrade pip
        python -m pip install --retries 5 --timeout 120 -r requirements.txt
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${APP_PORT:-8000}:8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.aiugc-prod-web.rule=Host(`lippelift.xyz`) || Host(`www.lippelift.xyz`) || Host(`srv1498567.hstgr.cloud`)
      - traefik.http.routers.aiugc-prod-web.entrypoints=websecure
      - traefik.http.routers.aiugc-prod-web.tls.certresolver=letsencrypt
      - traefik.http.services.aiugc-prod-web.loadbalancer.server.port=8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
