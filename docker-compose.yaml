services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-web.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-web.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-web.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME}-web.loadbalancer.server.port=8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "workers/video_poller.py"]
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

  topic-researcher:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "workers/topic_researcher.py"]
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
