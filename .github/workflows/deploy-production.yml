name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      PROD_SSH_HOST: 187.124.16.6
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER != '' && secrets.PROD_SSH_USER || vars.PROD_SSH_USER }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY != '' && secrets.PROD_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
      PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD != '' && secrets.PROD_SSH_PASSWORD || vars.PROD_SSH_PASSWORD }}
      PROD_ENV_FILE_B64: ${{ secrets.PROD_ENV_FILE_B64 }}
      PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64: ${{ secrets.PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64 }}
      PROD_APP_ROOT: ${{ secrets.PROD_APP_ROOT != '' && secrets.PROD_APP_ROOT || vars.PROD_APP_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate SSH deploy config
        run: |
          test -n "$PROD_SSH_HOST" || { echo "Missing PROD_SSH_HOST (GitHub secret or variable)."; exit 1; }
          test -n "$PROD_SSH_USER" || { echo "Missing PROD_SSH_USER (GitHub secret or variable)."; exit 1; }
          if [ -z "$PROD_SSH_PRIVATE_KEY" ] && [ -z "$PROD_SSH_PASSWORD" ]; then
            echo "Missing PROD_SSH_PRIVATE_KEY or PROD_SSH_PASSWORD GitHub secret."
            exit 1
          fi

      - name: Preflight SSH TCP reachability
        run: |
          python3 - <<'PY'
          import os
          import socket
          import time
          import sys

          host = os.environ["PROD_SSH_HOST"]
          timeout_seconds = 15
          attempts = 5
          last_error = None

          for attempt in range(1, attempts + 1):
              sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              sock.settimeout(timeout_seconds)
              try:
                  sock.connect((host, 22))
                  sock.close()
                  print(f"TCP reachability verified for {host}:22 on attempt {attempt}/{attempts}")
                  sys.exit(0)
              except OSError as exc:
                  last_error = exc
                  print(
                      f"Attempt {attempt}/{attempts} could not open TCP to {host}:22 within {timeout_seconds}s: {exc}",
                      file=sys.stderr,
                  )
                  time.sleep(5)
              finally:
                  try:
                      sock.close()
                  except OSError:
                      pass

          print(
              f"GitHub runner could not open IPv4 TCP to {host}:22 after {attempts} attempts: {last_error}",
              file=sys.stderr,
          )
          sys.exit(1)
          PY

      - name: Deploy over SSH with password
        if: env.PROD_SSH_PASSWORD != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.PROD_SSH_HOST }}
          timeout: 60s
          username: ${{ env.PROD_SSH_USER }}
          password: ${{ env.PROD_SSH_PASSWORD }}
          envs: PROD_ENV_FILE_B64,PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64
          script: |
            export APP_ROOT="${{ env.PROD_APP_ROOT }}"
            export APP_ROOT="${APP_ROOT:-/opt/aiugc-prod}"
            export REPO_DIR="${APP_ROOT}/repo"
            export ENV_FILE="${APP_ROOT}/.env.production"
            export APP_ENV_FILE="$ENV_FILE"
            export HEALTHCHECK_URL="https://lippelift.xyz/livez"
            export READINESSCHECK_URL="https://lippelift.xyz/health"
            mkdir -p "$APP_ROOT"
            if [ -n "${PROD_ENV_FILE_B64:-}" ]; then
              printf '%s' "$PROD_ENV_FILE_B64" | base64 -d > "$ENV_FILE"
              chmod 600 "$ENV_FILE"
            fi
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/patabrava/AIUGC.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd
            python3 - "$ENV_FILE" "$PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64" <<'PY'
            import base64
            import json
            import sys
            from pathlib import Path

            env_path = Path(sys.argv[1])
            adc_b64 = sys.argv[2].strip()
            overrides = {
                "GEMINI_PROVIDER": "vertex",
                "GEMINI_DEEP_RESEARCH_PROVIDER": "vertex_grounded",
                "GEMINI_API_FALLBACK_ENABLED": "false",
                "VERTEX_AI_PROJECT_ID": "project-89aac146-ec35-4755-b83",
                "VERTEX_AI_LOCATION": "us-central1",
                "VERTEX_AI_ENABLED": "true",
                "VERTEX_GEMINI_MODEL": "gemini-2.5-flash",
                "VERTEX_GEMINI_IMAGE_MODEL": "gemini-2.5-flash-image",
                "VERTEX_GROUNDED_RESEARCH_MODEL": "gemini-2.5-pro",
                "VERTEX_GROUNDED_RESEARCH_LOCATION": "global",
                "GOOGLE_APPLICATION_CREDENTIALS": "",
            }
            if adc_b64:
                overrides["GOOGLE_APPLICATION_CREDENTIALS_JSON"] = base64.b64decode(adc_b64).decode()

            lines = env_path.read_text().splitlines() if env_path.exists() else []
            keys = set(overrides)
            kept = [line for line in lines if "=" not in line or line.split("=", 1)[0] not in keys]
            for key, value in overrides.items():
                kept.append(f"{key}={json.dumps(value, ensure_ascii=False)}")
            env_path.write_text("\n".join(kept) + "\n")
            env_path.chmod(0o600)
            PY
            bash scripts/deploy/production.sh

      - name: Deploy over SSH with key
        if: env.PROD_SSH_PASSWORD == ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.PROD_SSH_HOST }}
          timeout: 60s
          username: ${{ env.PROD_SSH_USER }}
          key: ${{ env.PROD_SSH_PRIVATE_KEY }}
          envs: PROD_ENV_FILE_B64,PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64
          script: |
            export APP_ROOT="${{ env.PROD_APP_ROOT }}"
            export APP_ROOT="${APP_ROOT:-/opt/aiugc-prod}"
            export REPO_DIR="${APP_ROOT}/repo"
            export ENV_FILE="${APP_ROOT}/.env.production"
            export APP_ENV_FILE="$ENV_FILE"
            export HEALTHCHECK_URL="https://lippelift.xyz/livez"
            export READINESSCHECK_URL="https://lippelift.xyz/health"
            mkdir -p "$APP_ROOT"
            if [ -n "${PROD_ENV_FILE_B64:-}" ]; then
              printf '%s' "$PROD_ENV_FILE_B64" | base64 -d > "$ENV_FILE"
              chmod 600 "$ENV_FILE"
            fi
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/patabrava/AIUGC.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd
            python3 - "$ENV_FILE" "$PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64" <<'PY'
            import base64
            import json
            import sys
            from pathlib import Path

            env_path = Path(sys.argv[1])
            adc_b64 = sys.argv[2].strip()
            overrides = {
                "GEMINI_PROVIDER": "vertex",
                "GEMINI_DEEP_RESEARCH_PROVIDER": "vertex_grounded",
                "GEMINI_API_FALLBACK_ENABLED": "false",
                "VERTEX_AI_PROJECT_ID": "project-89aac146-ec35-4755-b83",
                "VERTEX_AI_LOCATION": "us-central1",
                "VERTEX_AI_ENABLED": "true",
                "VERTEX_GEMINI_MODEL": "gemini-2.5-flash",
                "VERTEX_GEMINI_IMAGE_MODEL": "gemini-2.5-flash-image",
                "VERTEX_GROUNDED_RESEARCH_MODEL": "gemini-2.5-pro",
                "VERTEX_GROUNDED_RESEARCH_LOCATION": "global",
                "GOOGLE_APPLICATION_CREDENTIALS": "",
            }
            if adc_b64:
                overrides["GOOGLE_APPLICATION_CREDENTIALS_JSON"] = base64.b64decode(adc_b64).decode()

            lines = env_path.read_text().splitlines() if env_path.exists() else []
            keys = set(overrides)
            kept = [line for line in lines if "=" not in line or line.split("=", 1)[0] not in keys]
            for key, value in overrides.items():
                kept.append(f"{key}={json.dumps(value, ensure_ascii=False)}")
            env_path.write_text("\n".join(kept) + "\n")
            env_path.chmod(0o600)
            PY
            bash scripts/deploy/production.sh

      - name: Verify production route from runner
        run: |
          curl --fail --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --retry 5 \
            --retry-delay 5 \
            https://lippelift.xyz/livez
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://lippelift.xyz/auth/login >/dev/null
          sleep 70
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://lippelift.xyz/livez
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://lippelift.xyz/auth/login >/dev/null
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://lippelift.xyz/health >/dev/null

      - name: Diagnose production route with password
        if: failure() && env.PROD_SSH_PASSWORD != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.PROD_SSH_HOST }}
          timeout: 60s
          username: ${{ env.PROD_SSH_USER }}
          password: ${{ env.PROD_SSH_PASSWORD }}
          script: |
            cd /opt/aiugc-prod/repo
            echo "== local app =="
            curl -i --connect-timeout 3 --max-time 10 http://127.0.0.1:8000/livez || true
            echo "== local traefik https =="
            curl -k -i --resolve lippelift.xyz:443:127.0.0.1 --connect-timeout 3 --max-time 10 https://lippelift.xyz/livez || true
            echo "== compose ps =="
            docker compose -f docker-compose.production.yml -p aiugc-prod --env-file /opt/aiugc-prod/.env.production ps || true
            echo "== web labels =="
            docker inspect aiugc-prod-web-1 --format '{{json .Config.Labels}}' || true
            echo "== web networks =="
            docker inspect aiugc-prod-web-1 --format '{{json .NetworkSettings.Networks}}' || true
            echo "== listeners =="
            ss -ltnp | grep -E ':80|:443|:8000' || true
            echo "== web logs =="
            docker compose -f docker-compose.production.yml -p aiugc-prod --env-file /opt/aiugc-prod/.env.production logs --tail=160 web || true
            echo "== traefik logs =="
            docker logs traefik-traefik-1 --tail=240 2>&1 | grep -Ei 'lippelift|aiugc|error|timeout|502|504|bad gateway' || true

      - name: Diagnose production route with key
        if: failure() && env.PROD_SSH_PASSWORD == ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.PROD_SSH_HOST }}
          timeout: 60s
          username: ${{ env.PROD_SSH_USER }}
          key: ${{ env.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/aiugc-prod/repo
            echo "== local app =="
            curl -i --connect-timeout 3 --max-time 10 http://127.0.0.1:8000/livez || true
            echo "== local traefik https =="
            curl -k -i --resolve lippelift.xyz:443:127.0.0.1 --connect-timeout 3 --max-time 10 https://lippelift.xyz/livez || true
            echo "== compose ps =="
            docker compose -f docker-compose.production.yml -p aiugc-prod --env-file /opt/aiugc-prod/.env.production ps || true
            echo "== web labels =="
            docker inspect aiugc-prod-web-1 --format '{{json .Config.Labels}}' || true
            echo "== web networks =="
            docker inspect aiugc-prod-web-1 --format '{{json .NetworkSettings.Networks}}' || true
            echo "== listeners =="
            ss -ltnp | grep -E ':80|:443|:8000' || true
            echo "== web logs =="
            docker compose -f docker-compose.production.yml -p aiugc-prod --env-file /opt/aiugc-prod/.env.production logs --tail=160 web || true
            echo "== traefik logs =="
            docker logs traefik-traefik-1 --tail=240 2>&1 | grep -Ei 'lippelift|aiugc|error|timeout|502|504|bad gateway' || true
