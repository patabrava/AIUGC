name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      HOSTINGER_API_BASE: https://developers.hostinger.com
      HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
      HOSTINGER_PROJECT_NAME: aiugc-prod
      HOSTINGER_VPS_ID: "1498567"
      PROD_ENV_FILE_B64: ${{ secrets.PROD_ENV_FILE_B64 }}
      PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64: ${{ secrets.PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64 }}
      PROD_MAGNIFIC_API_KEY: ${{ secrets.PROD_MAGNIFIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate production deploy config
        run: |
          test -n "$HOSTINGER_API_TOKEN" || { echo "Missing HOSTINGER_API_TOKEN GitHub secret."; exit 1; }
          test -n "$PROD_ENV_FILE_B64" || { echo "Missing PROD_ENV_FILE_B64 GitHub secret."; exit 1; }
          test -n "$PROD_MAGNIFIC_API_KEY" || { echo "Missing PROD_MAGNIFIC_API_KEY GitHub secret."; exit 1; }
          test -n "$PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64" || { echo "Missing PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64 GitHub secret."; exit 1; }

      - name: Resolve immutable image reference
        id: image
        run: |
          image_repo="$(printf '%s' "ghcr.io/${GITHUB_REPOSITORY_OWNER}/aiugc-prod" | tr '[:upper:]' '[:lower:]')"
          echo "repo=$image_repo" >> "$GITHUB_OUTPUT"
          echo "ref=${image_repo}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.repo }}:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Render Hostinger compose payload
        run: |
          mkdir -p .deploy
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          def parse_env_lines(text: str) -> dict[str, str]:
              env: dict[str, str] = {}
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  key = key.strip()
                  value = value.strip()
                  if value[:1] == value[-1:] == '"':
                      try:
                          value = json.loads(value)
                      except json.JSONDecodeError:
                          value = value[1:-1]
                  elif value[:1] == value[-1:] == "'":
                      value = value[1:-1]
                  env[key] = value
              return env

          env_text = base64.b64decode(os.environ["PROD_ENV_FILE_B64"]).decode()
          env_map = parse_env_lines(env_text)
          env_map.update(
              {
                  "DISABLE_BACKGROUND_SCHEDULERS": "true",
                  "DISABLE_STARTUP_RECOVERY_CHECKS": "true",
                  "GEMINI_API_FALLBACK_ENABLED": "false",
                  "GEMINI_DEEP_RESEARCH_PROVIDER": "vertex_grounded",
                  "GEMINI_PROVIDER": "vertex",
                  "GOOGLE_APPLICATION_CREDENTIALS": "",
                  "MAGNIFIC_API_KEY": os.environ["PROD_MAGNIFIC_API_KEY"].strip(),
                  "SCENE_REFERENCE_STYLE_LORAS": "bathroom_accessibility_a=bathroom-accessibility-a:65,car_transfer_residential_a=car-transfer-residential-a:65,home_living_room_advice_a=home-living-room-advice-a:65",
                  "TIKTOK_ENVIRONMENT": "production",
                  "TRAEFIK_CERTRESOLVER": env_map.get("TRAEFIK_CERTRESOLVER", "letsencrypt"),
                  "TRAEFIK_ENTRYPOINTS": env_map.get("TRAEFIK_ENTRYPOINTS", "websecure"),
                  "TRAEFIK_HOST_RULE": env_map.get(
                      "TRAEFIK_HOST_RULE",
                      "Host(`lippelift.xyz`) || Host(`www.lippelift.xyz`) || Host(`srv1498567.hstgr.cloud`)",
                  ),
                  "VEO_ENABLE_SEGMENTED_ROUTE": "true",
                  "VERTEX_AI_ENABLED": "true",
                  "VERTEX_AI_LOCATION": "us-central1",
                  "VERTEX_AI_OUTPUT_GCS_URI": "gs://project-ad4d28ca-000c-4432-b4f-vertex-output/",
                  "VERTEX_AI_PROJECT_ID": "project-ad4d28ca-000c-4432-b4f",
                  "VERTEX_GEMINI_IMAGE_MODEL": "gemini-2.5-flash-image",
                  "VERTEX_GEMINI_MODEL": "gemini-2.5-flash",
                  "VERTEX_GROUNDED_RESEARCH_LOCATION": "global",
                  "VERTEX_GROUNDED_RESEARCH_MODEL": "gemini-2.5-pro",
                  "VIDEO_POLLER_ENABLE_SCRIPT_BANK_EXPANSION": env_map.get(
                      "VIDEO_POLLER_ENABLE_SCRIPT_BANK_EXPANSION",
                      "false",
                  ),
              }
          )
          env_map["GOOGLE_APPLICATION_CREDENTIALS_JSON"] = json.dumps(
              json.loads(base64.b64decode(os.environ["PROD_GOOGLE_APPLICATION_CREDENTIALS_JSON_B64"]).decode()),
              separators=(",", ":"),
              ensure_ascii=False,
          )

          image_ref = os.environ["IMAGE_REF"]
          env_keys = sorted(env_map)
          env_lines = [f"{key}={json.dumps(value, ensure_ascii=False)}" for key, value in env_map.items()]
          # Hostinger's docker API caps the compose "content" field at 8192
          # chars. Define the env list once via a YAML anchor and alias it in
          # every service so the rendered compose stays well under that limit.
          compose_lines = [
              "x-app-env: &app-env",
              *[f"  - {key}" for key in env_keys],
              "",
              "services:",
              "  web:",
              f"    image: {image_ref}",
              "    pull_policy: always",
              "    restart: unless-stopped",
              "    environment: *app-env",
              "    command: uvicorn app.main:app --host 0.0.0.0 --port 8000",
              '    expose:',
              '      - "8000"',
              "    ports:",
              '      - "127.0.0.1:8000:8000"',
              "    labels:",
              "      - traefik.enable=true",
              "      - 'traefik.http.routers.lippelift-prod-web-v4.rule=${TRAEFIK_HOST_RULE:-Host(`lippelift.xyz`) || Host(`www.lippelift.xyz`) || Host(`srv1498567.hstgr.cloud`)}'",
              "      - 'traefik.http.routers.lippelift-prod-web-v4.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}'",
              "      - 'traefik.http.routers.lippelift-prod-web-v4.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}'",
              "      - traefik.http.services.lippelift-prod-web-v4.loadbalancer.server.port=8000",
              "",
              "  worker:",
              f"    image: {image_ref}",
              "    pull_policy: always",
              "    restart: unless-stopped",
              "    environment: *app-env",
              "    command: python workers/video_poller.py",
              "",
              "  expansion-worker:",
              f"    image: {image_ref}",
              "    pull_policy: always",
              "    restart: unless-stopped",
              "    environment: *app-env",
              "    command: python workers/expansion_worker.py",
              "",
              "  topic-worker:",
              f"    image: {image_ref}",
              "    pull_policy: always",
              "    restart: unless-stopped",
              "    environment: *app-env",
              "    command: python workers/topic_worker.py",
              "",
              "  caption-worker:",
              f"    image: {image_ref}",
              "    pull_policy: always",
              "    restart: unless-stopped",
              "    environment: *app-env",
              "    command: python -m workers.caption_worker",
          ]
          compose_text = "\n".join(compose_lines) + "\n"

          deploy_dir = Path(".deploy")
          deploy_dir.mkdir(exist_ok=True)
          deploy_dir.joinpath("hostinger-compose.yml").write_text(compose_text, encoding="utf-8")
          deploy_dir.joinpath("hostinger.env").write_text("\n".join(env_lines) + "\n", encoding="utf-8")
          deploy_dir.joinpath("payload.json").write_text(
              json.dumps(
                  {
                      "content": compose_text,
                      "environment": "\n".join(env_lines) + "\n",
                      "project_name": os.environ["HOSTINGER_PROJECT_NAME"],
                  },
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )
          PY
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}

      - name: Replace Hostinger project with immutable image release
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          api_base = os.environ["HOSTINGER_API_BASE"].rstrip("/")
          token = os.environ["HOSTINGER_API_TOKEN"]
          vps_id = os.environ["HOSTINGER_VPS_ID"]
          payload = Path(".deploy/payload.json").read_text(encoding="utf-8").encode()

          def request(method: str, url: str, data: bytes | None = None) -> dict:
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/json",
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      # Cloudflare on developers.hostinger.com bans the default
                      # "Python-urllib/x.y" agent (error 1010). Send a browser UA.
                      "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      body = response.read().decode()
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode()
                  print(body, file=sys.stderr)
                  raise SystemExit(f"Hostinger API {method} {url} failed with HTTP {exc.code}") from exc
              return json.loads(body)

          def find_action_id(node):
              if isinstance(node, dict):
                  if isinstance(node.get("action_id"), int):
                      return node["action_id"]
                  if isinstance(node.get("id"), int) and str(node.get("name", "")).startswith("docker_compose"):
                      return node["id"]
                  for value in node.values():
                      action_id = find_action_id(value)
                      if action_id is not None:
                          return action_id
              elif isinstance(node, list):
                  for value in node:
                      action_id = find_action_id(value)
                      if action_id is not None:
                          return action_id
              return None

          create_url = f"{api_base}/api/vps/v1/virtual-machines/{vps_id}/docker"
          create_response = request("POST", create_url, payload)
          action_id = find_action_id(create_response)
          if action_id is None:
              raise SystemExit(f"Could not find Hostinger action id in response: {create_response}")
          print(f"Triggered Hostinger action {action_id}")

          action_url = f"{api_base}/api/vps/v1/virtual-machines/{vps_id}/actions/{action_id}"
          deadline = time.time() + 15 * 60
          while time.time() < deadline:
              action = request("GET", action_url)
              state = str(action.get("state", "")).lower()
              print(json.dumps(action, ensure_ascii=False))
              if state == "success":
                  sys.exit(0)
              if state in {"failed", "error", "canceled"}:
                  raise SystemExit(f"Hostinger deployment action {action_id} finished in state '{state}'")
              time.sleep(10)

          raise SystemExit(f"Timed out waiting for Hostinger action {action_id}")
          PY

      - name: Verify production route from runner
        run: |
          curl --fail --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --retry 5 \
            --retry-delay 5 \
            https://lippelift.xyz/livez
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://lippelift.xyz/auth/login >/dev/null
          sleep 70
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://lippelift.xyz/livez
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://lippelift.xyz/auth/login >/dev/null
          curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://lippelift.xyz/health >/dev/null
          python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("https://lippelift.xyz/livez", timeout=20) as response:
              payload = json.loads(response.read().decode("utf-8"))
          routes = payload.get("video_routes") or {}
          if routes.get("segmented_route_enabled") is not True or routes.get("tier_32_route") != "veo_segmented":
              raise SystemExit(f"Production video routing is not segmented: {routes}")
          print(f"Production video routing verified: {routes}")
          PY
