name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST || vars.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER || vars.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
          script: |
            export APP_ROOT="${{ secrets.PROD_APP_ROOT || vars.PROD_APP_ROOT }}"
            export APP_ROOT="${APP_ROOT:-/opt/aiugc-prod}"
            export REPO_DIR="${APP_ROOT}/repo"
            export ENV_FILE="${APP_ROOT}/.env.production"
            export HEALTHCHECK_URL="https://lippelift.xyz/health"
            mkdir -p "$APP_ROOT"
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/patabrava/AIUGC.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            bash scripts/deploy/production.sh
