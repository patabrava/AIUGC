services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      DISABLE_BACKGROUND_SCHEDULERS: ${DISABLE_BACKGROUND_SCHEDULERS:-true}
      DISABLE_STARTUP_RECOVERY_CHECKS: ${DISABLE_STARTUP_RECOVERY_CHECKS:-true}
      VEO_ENABLE_SEGMENTED_ROUTE: ${VEO_ENABLE_SEGMENTED_ROUTE:-true}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.lippelift-prod-web-v4.rule=${TRAEFIK_HOST_RULE:-Host(`lippelift.xyz`)}'
      - 'traefik.http.routers.lippelift-prod-web-v4.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}'
      - 'traefik.http.routers.lippelift-prod-web-v4.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}'
      - traefik.http.services.lippelift-prod-web-v4.loadbalancer.server.port=8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      VEO_ENABLE_SEGMENTED_ROUTE: ${VEO_ENABLE_SEGMENTED_ROUTE:-true}
    command: python workers/video_poller.py

  semantic-video-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      VEO_ENABLE_SEGMENTED_ROUTE: ${VEO_ENABLE_SEGMENTED_ROUTE:-true}
      SEMANTIC_VIDEO_WORKER_POLL_SECONDS: ${SEMANTIC_VIDEO_WORKER_POLL_SECONDS:-5}
    command: python -m workers.semantic_video_worker

  expansion-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      VEO_ENABLE_SEGMENTED_ROUTE: ${VEO_ENABLE_SEGMENTED_ROUTE:-true}
      VIDEO_POLLER_ENABLE_SCRIPT_BANK_EXPANSION: ${VIDEO_POLLER_ENABLE_SCRIPT_BANK_EXPANSION:-false}
    command: python workers/expansion_worker.py

  topic-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      VEO_ENABLE_SEGMENTED_ROUTE: ${VEO_ENABLE_SEGMENTED_ROUTE:-true}
    command: python workers/topic_worker.py

  caption-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      VEO_ENABLE_SEGMENTED_ROUTE: ${VEO_ENABLE_SEGMENTED_ROUTE:-true}
    command: python -m workers.caption_worker
