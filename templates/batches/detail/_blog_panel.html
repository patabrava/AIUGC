{# _blog_panel.html — Blog Posts Panel #}
{% set all_posts = batch_view.visible_posts if batch_view is defined and batch_view.visible_posts else [] %}
{% set blog_posts = all_posts | selectattr('blog_enabled') | list %}
{% if blog_posts %}
<div class="mt-6 rounded-xl border border-white/10 bg-[#1a1a2e] overflow-hidden"
     x-data="blogPanelComponent()"
     x-init="initPosts(JSON.parse($refs.blogData.textContent))"
     id="blog-panel">
    <script type="application/json" x-ref="blogData">{{ blog_posts | tojson }}</script>

    <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">
        <div class="flex items-center gap-3">
            <h3 class="text-base font-semibold text-gray-100">Blog Posts</h3>
            <span class="bg-[#006AAB]/20 text-[#006AAB]/80 text-xs font-semibold px-2 py-0.5 rounded-full"
                  x-text="posts.length + ' of {{ all_posts | length }} posts'"></span>
        </div>
        <button class="brand-button-primary text-sm font-medium px-4 py-2 rounded-lg transition brand-focus text-white"
                type="button"
                @click="generateAllDrafts()">
            Generate All Drafts
        </button>
    </div>

    <template x-for="post in posts" :key="post.id">
        <div class="border-b border-white/5">
            <div class="flex items-center justify-between px-6 py-3 cursor-pointer hover:bg-white/5 transition"
                 @click="toggleExpand(post.id)">
                <div class="flex items-center gap-3 min-w-0 flex-1">
                    <span class="text-xs font-semibold px-2 py-0.5 rounded-full uppercase flex-shrink-0"
                          :class="{ 'bg-[#006AAB] text-white': post.post_type === 'value', 'bg-sky-500 text-white': post.post_type === 'lifestyle', 'bg-amber-500 text-white': post.post_type === 'product' }"
                          x-text="post.post_type"></span>
                    <span class="text-sm text-gray-200 truncate"
                          x-text="post.blog_content?.name || post.topic_title"></span>
                </div>
                <div class="flex items-center gap-3 flex-shrink-0">
                    <span class="text-xs font-semibold px-2 py-0.5 rounded-full"
                          :class="{ 'bg-green-500/15 text-green-400': effectiveStatus(post) === 'draft' || effectiveStatus(post) === 'published', 'bg-blue-500/15 text-blue-400': effectiveStatus(post) === 'scheduled', 'bg-amber-500/15 text-amber-400': effectiveStatus(post) === 'pending', 'bg-[#006AAB]/15 text-[#006AAB]/80': effectiveStatus(post) === 'generating' || effectiveStatus(post) === 'publishing', 'bg-red-500/15 text-red-400': effectiveStatus(post) === 'failed', }"
                          x-text="statusLabel(post)"></span>
                    <template x-if="effectiveStatus(post) === 'pending' || effectiveStatus(post) === 'failed'">
                        <button class="brand-button-primary text-xs font-medium px-3 py-1 rounded transition brand-focus text-white"
                                type="button"
                                :disabled="isBusy(post)"
                                :class="isBusy(post) ? 'opacity-60 cursor-wait' : ''"
                                @click.stop="generateDraft(post.id)">
                            <span x-text="isBusyFor(post, 'draft') ? 'Generating…' : 'Generate'"></span>
                        </button>
                    </template>
                    <span class="text-gray-500 text-sm" x-text="expanded === post.id ? '&#9660;' : '&#9654;'"></span>
                </div>
            </div>

            <template x-if="post.clientNote || post.blog_content?.error">
                <div class="px-6 pb-3 text-xs"
                     :class="effectiveStatus(post) === 'failed' ? 'text-red-300' : 'text-blue-300'"
                     x-text="post.clientNote || post.blog_content?.error"></div>
            </template>

            <template x-if="expanded === post.id && post.blog_content && post.blog_content.body_html">
                <div class="px-6 pb-5 space-y-6">
                    <div class="grid gap-4 md:grid-cols-2">
                        <div>
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Name</label>
                            <input type="text"
                                   class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 font-medium focus:border-[#006AAB] focus:outline-none"
                                   :value="post.blog_content.name"
                                   @blur="saveField(post.id, 'name', $event.target.value)">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Slug</label>
                            <input type="text"
                                   class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none"
                                   :value="post.blog_content.slug"
                                   @blur="saveField(post.id, 'slug', $event.target.value)">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Merksatz</label>
                            <input type="text"
                                   class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none"
                                   :value="post.blog_content.merksatz"
                                   @blur="saveField(post.id, 'merksatz', $event.target.value)">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Tipp</label>
                            <input type="text"
                                   class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none"
                                   :value="post.blog_content.tipp"
                                   @blur="saveField(post.id, 'tipp', $event.target.value)">
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-xs text-gray-400 uppercase tracking-wide">Zusammenfassung</label>
                            <span class="text-xs text-gray-500">Rich text preview</span>
                        </div>
                        <div class="bg-[#0f0f1e] border border-white/10 rounded-lg px-4 py-4 text-sm text-gray-100 prose prose-invert max-w-none prose-p:my-3 prose-ul:my-3 prose-li:my-1 prose-headings:text-gray-100"
                             x-html="post.blog_content.summary_html"></div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-xs text-gray-400 uppercase tracking-wide">Inhalt</label>
                            <span class="text-xs text-gray-500" x-text="(post.blog_content.word_count || 0) + ' words'"></span>
                        </div>
                        <div class="bg-[#0f0f1e] border border-white/10 rounded-lg px-4 py-4 text-sm text-gray-100 prose prose-invert max-w-none prose-p:my-3 prose-ul:my-3 prose-li:my-1 prose-headings:text-gray-100 max-h-[32rem] overflow-y-auto"
                             x-html="post.blog_content.body_html"></div>
                    </div>

                    <div class="grid gap-4 md:grid-cols-2">
                        <div>
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Veroeffentlichungsdatum</label>
                            <input type="datetime-local"
                                   x-model="post.blogScheduledAtLocal"
                                   class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none">
                            <p class="mt-2 text-xs text-blue-300" x-show="post.blog_scheduled_at">
                                Scheduled for <span x-text="formatScheduled(post.blog_scheduled_at)"></span>
                            </p>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Vorschautext</label>
                            <textarea class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none resize-y"
                                      rows="3"
                                      @blur="saveField(post.id, 'preview_text', $event.target.value)"
                                      x-text="post.blog_content.preview_text"></textarea>
                        </div>
                    </div>

                    <div class="grid gap-4 md:grid-cols-2">
                        <div>
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Lesedauer</label>
                            <input type="text"
                                   readonly
                                   class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-400 focus:outline-none"
                                   :value="post.blog_content.reading_time">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Autor</label>
                            <input type="text"
                                   placeholder="Exact Webflow option label"
                                   class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none"
                                   :value="post.blog_content.author_name || ''"
                                   @blur="saveField(post.id, 'author_name', $event.target.value)">
                        </div>
                    </div>

                    <div class="grid gap-4 md:grid-cols-2">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Bildprompt</label>
                                <textarea class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none resize-y"
                                          rows="4"
                                          placeholder="Beschreibe das Bild, das generiert werden soll"
                                          x-model="post.blog_content.image_prompt"
                                          @blur="saveField(post.id, 'image_prompt', $event.target.value)"></textarea>
                                <div class="mt-2 flex gap-2 flex-wrap">
                                    <button class="text-xs font-medium px-3 py-1.5 rounded-lg brand-button-primary transition brand-focus text-white"
                                            type="button"
                                            :disabled="isBusy(post)"
                                            :class="isBusy(post) ? 'opacity-60 cursor-wait' : ''"
                                            @click="generateImage(post)">
                                        <span x-text="isBusyFor(post, 'image') ? 'Generating…' : 'Generate Image'"></span>
                                    </button>
                                    <button class="text-xs font-medium px-3 py-1.5 rounded-lg border border-white/10 text-gray-200 hover:bg-white/5 transition"
                                            type="button"
                                            :disabled="isBusy(post)"
                                            :class="isBusy(post) ? 'opacity-60 cursor-wait' : ''"
                                            @click="regenerateImage(post)">
                                        <span x-text="isBusyFor(post, 'image') ? 'Generating…' : 'Regenerate'"></span>
                                    </button>
                                    <button class="text-xs font-medium px-3 py-1.5 rounded-lg border border-red-500/30 text-red-300 hover:bg-red-500/10 transition"
                                            type="button"
                                            :disabled="isBusy(post)"
                                            :class="isBusy(post) ? 'opacity-60 cursor-wait' : ''"
                                            @click="removeImage(post)">
                                        <span x-text="isBusyFor(post, 'image') ? 'Working…' : 'Remove'"></span>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Meta-Titel</label>
                                <input type="text"
                                       class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none"
                                       :value="post.blog_content.meta_title"
                                       @blur="saveField(post.id, 'meta_title', $event.target.value)">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Meta-Beschreibung</label>
                                <textarea class="w-full bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none resize-y"
                                          rows="3"
                                          @blur="saveField(post.id, 'meta_description', $event.target.value)"
                                          x-text="post.blog_content.meta_description"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="grid gap-4 md:grid-cols-2">
                        <div class="bg-[#0f0f1e] border border-white/10 rounded-lg px-4 py-4">
                            <div class="flex items-center justify-between gap-2 mb-2">
                                <label class="block text-xs text-gray-400 uppercase tracking-wide">Bildvorschau</label>
                                <span class="text-xs text-gray-500" x-text="post.blog_content.image_model || 'Gemini'"></span>
                            </div>
                            <template x-if="post.blog_content.preview_image_url">
                                <img :src="post.blog_content.preview_image_url"
                                     alt="Generated blog preview"
                                     class="w-full max-h-80 rounded-lg border border-white/10 object-cover">
                            </template>
                            <template x-if="!post.blog_content.preview_image_url">
                                <div class="flex min-h-48 items-center justify-center rounded-lg border border-dashed border-white/10 text-sm text-gray-500">
                                    No preview image yet
                                </div>
                            </template>
                            <p class="mt-3 text-xs text-gray-400" x-text="post.blog_content.image_generated_at ? ('Generated at ' + post.blog_content.image_generated_at) : ''"></p>
                        </div>
                        <div class="bg-[#0f0f1e] border border-white/10 rounded-lg px-4 py-4">
                            <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Accepted image URL</label>
                            <input type="url"
                                   class="w-full bg-[#0c0c18] border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-[#006AAB] focus:outline-none"
                                   :value="post.blog_content.preview_image_url || ''"
                                   @blur="saveField(post.id, 'preview_image_url', $event.target.value)">
                            <p class="mt-2 text-xs text-gray-500">This URL is what gets sent to Webflow as `vorschaubild`.</p>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1">Sources (from dossier)</label>
                        <div class="bg-[#0f0f1e] border border-white/10 rounded-lg px-3 py-2 text-xs text-gray-400 leading-relaxed">
                            <template x-for="src in (post.blog_content.sources || [])" :key="src.url">
                                <a :href="src.url" target="_blank" rel="noopener noreferrer"
                                   class="block text-[var(--lippe-blue)] hover:text-[#006AAB]/80 hover:underline cursor-pointer"
                                   x-text="'• ' + src.title"></a>
                            </template>
                        </div>
                    </div>

                    <div class="flex items-center justify-between gap-3 flex-wrap">
                        <div class="flex gap-2">
                            <button class="text-[var(--lippe-blue)] border border-[var(--lippe-blue)] border-opacity-30 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-[var(--lippe-blue)] hover:bg-opacity-10 transition"
                                    type="button"
                                    :disabled="isBusy(post)"
                                    :class="isBusy(post) ? 'opacity-60 cursor-wait' : ''"
                                    @click="generateDraft(post.id)">
                                <span x-text="isBusyFor(post, 'draft') ? 'Regenerating…' : 'Regenerate Draft'"></span>
                            </button>
                            <button class="text-blue-300 border border-blue-500/30 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-blue-500/10 transition"
                                    type="button"
                                    :disabled="isBusy(post)"
                                    :class="isBusy(post) ? 'opacity-60 cursor-wait' : ''"
                                    @click="scheduleDraft(post)">
                                <span x-text="post.blog_status === 'scheduled' ? 'Reschedule' : 'Schedule'"></span>
                            </button>
                        </div>
                        <div class="flex items-center gap-2">
                            <template x-if="post.blog_webflow_item_id">
                                <button class="brand-button-primary text-xs font-medium px-3 py-1.5 rounded-lg transition brand-focus text-white"
                                        type="button"
                                        :disabled="isBusy(post)"
                                        :class="isBusy(post) ? 'opacity-60 cursor-wait' : ''"
                                        @click="publishNow(post.id)">
                                    <span x-text="isBusyFor(post, 'publish') ? 'Publishing…' : 'Update on Webflow'"></span>
                                </button>
                            </template>
                            <template x-if="!post.blog_webflow_item_id">
                                <button class="brand-button-primary text-xs font-medium px-3 py-1.5 rounded-lg hover:brand-button-primary transition brand-focus text-white"
                                        type="button"
                                        :disabled="isBusy(post)"
                                        :class="isBusy(post) ? 'opacity-60 cursor-wait' : ''"
                                        @click="publishNow(post.id)">
                                    <span x-text="isBusyFor(post, 'publish') ? 'Publishing…' : 'Publish Now'"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <div class="flex items-center justify-between px-6 py-3 bg-[#006AAB]/5">
        <span class="text-xs text-gray-500"
              x-text="posts.filter(p => p.blog_status === 'draft').length + ' draft(s) ready · ' + posts.filter(p => p.blog_status === 'scheduled').length + ' scheduled · ' + posts.filter(p => p.blog_status === 'pending').length + ' pending'"></span>
    </div>
</div>

<script>
function blogPanelComponent() {
    return {
        posts: [],
        expanded: null,
        isGenerating: false,
        decoratePost(post) {
            return {
                ...post,
                blogScheduledAtLocal: this.toLocalInput(post.blog_scheduled_at || post.blog_content?.publication_date),
                busyAction: null,
                clientStatus: null,
                clientNote: '',
            };
        },
        initPosts(rawPosts) {
            this.posts = (rawPosts || []).map((post) => this.decoratePost(post));
        },
        findPost(postId) {
            return this.posts.find((post) => post.id === postId);
        },
        effectiveStatus(post) {
            return post?.clientStatus || post?.blog_status || 'pending';
        },
        statusLabel(post) {
            const status = this.effectiveStatus(post);
            if (post?.busyAction === 'image') return 'Generating Image';
            if (status === 'draft') return 'Draft Ready';
            if (status === 'published') return 'Published';
            if (status === 'scheduled') return 'Scheduled';
            if (status === 'generating') return 'Generating';
            if (status === 'publishing') return 'Publishing';
            if (status === 'failed') return 'Failed';
            return (status || '').charAt(0).toUpperCase() + (status || '').slice(1);
        },
        isBusy(post) {
            return Boolean(post?.busyAction);
        },
        isBusyFor(post, action) {
            return post?.busyAction === action;
        },
        setBusy(post, action, note) {
            if (!post) return;
            post.busyAction = action;
            post.clientStatus = action === 'publish' ? 'publishing' : 'generating';
            post.clientNote = note || '';
            if (post.blog_content) {
                post.blog_content.error = null;
            }
        },
        clearBusy(post) {
            if (!post) return;
            post.busyAction = null;
            post.clientStatus = null;
        },
        flashNote(post, note) {
            if (!post) return;
            post.clientNote = note;
            window.setTimeout(() => {
                if (post.clientNote === note) {
                    post.clientNote = '';
                }
            }, 4000);
        },
        async readPayload(response) {
            return await response.json().catch(() => null);
        },
        toggleExpand(postId) {
            this.expanded = this.expanded === postId ? null : postId;
            window.batchDetailExpanded = !!this.expanded;
        },
        toLocalInput(value) {
            if (!value) return '';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return '';
            if (typeof window.zoneDateToLocalValue === 'function') {
                return window.zoneDateToLocalValue(parsed, 'Europe/Berlin');
            }
            return String(value).slice(0, 16);
        },
        formatScheduled(value) {
            if (!value) return '';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return value;
            return parsed.toLocaleString('de-DE', {
                dateStyle: 'medium',
                timeStyle: 'short',
                timeZone: 'Europe/Berlin',
            });
        },
        async generateDraft(postId) {
            const post = this.findPost(postId);
            if (!postId || !post || this.isGenerating || this.isBusy(post)) return;
            this.isGenerating = true;
            this.expanded = postId;
            this.setBusy(post, 'draft', 'Generating blog draft...');
            try {
                const response = await fetch('/blog/posts/' + postId + '/blog/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                const payload = await this.readPayload(response);
                const errorMessage = payload?.data?.error || payload?.detail || payload?.message;
                if (!response.ok || payload?.ok === false || errorMessage) {
                    throw new Error(errorMessage || `Generate failed (${response.status})`);
                }
                post.blog_content = payload.data;
                post.blog_status = post.blog_scheduled_at ? 'scheduled' : 'draft';
                this.flashNote(post, 'Draft generated.');
            } catch (error) {
                console.error('Failed to generate blog draft', error);
                post.blog_status = 'failed';
                post.clientStatus = 'failed';
                post.clientNote = error instanceof Error ? error.message : 'Failed to generate blog draft';
                post.blog_content = { ...(post.blog_content || {}), error: post.clientNote };
                alert(post.clientNote);
            } finally {
                if (post.blog_status !== 'failed') {
                    this.clearBusy(post);
                } else {
                    post.busyAction = null;
                }
                this.isGenerating = false;
            }
        },
        async publishNow(postId) {
            const post = this.findPost(postId);
            if (!postId || !post || this.isGenerating || this.isBusy(post)) return;
            this.isGenerating = true;
            this.setBusy(post, 'publish', 'Publishing to Webflow...');
            try {
                const response = await fetch('/blog/posts/' + postId + '/blog/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                const payload = await this.readPayload(response);
                const errorMessage = payload?.detail || payload?.message;
                if (!response.ok || payload?.ok === false) {
                    throw new Error(errorMessage || `Publish failed (${response.status})`);
                }
                post.blog_status = payload.data.blog_status || 'published';
                post.blog_webflow_item_id = payload.data.webflow_item_id || post.blog_webflow_item_id;
                post.blog_published_at = payload.data.blog_published_at || post.blog_published_at;
                this.flashNote(post, 'Published to Webflow.');
            } catch (error) {
                console.error('Failed to publish blog post', error);
                post.blog_status = 'failed';
                post.clientStatus = 'failed';
                post.clientNote = error instanceof Error ? error.message : 'Failed to publish blog post';
                alert(post.clientNote);
            } finally {
                if (post.blog_status !== 'failed') {
                    this.clearBusy(post);
                } else {
                    post.busyAction = null;
                }
                this.isGenerating = false;
            }
        },
        async scheduleDraft(post) {
            if (!post?.id || this.isGenerating || this.isBusy(post)) return;
            if (!post.blogScheduledAtLocal) {
                alert('Choose a schedule date first.');
                return;
            }
            const scheduledDate = typeof window.zonedLocalValueToUtcDate === 'function'
                ? window.zonedLocalValueToUtcDate(post.blogScheduledAtLocal, 'Europe/Berlin')
                : new Date(post.blogScheduledAtLocal);
            if (!(scheduledDate instanceof Date) || Number.isNaN(scheduledDate.getTime())) {
                alert('Invalid schedule date.');
                return;
            }
            this.isGenerating = true;
            try {
                const response = await fetch('/blog/posts/' + post.id + '/blog/schedule', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scheduled_at: scheduledDate.toISOString() }),
                });
                const payload = await this.readPayload(response);
                const errorMessage = payload?.detail || payload?.message;
                if (!response.ok || payload?.ok === false) {
                    throw new Error(errorMessage || `Schedule failed (${response.status})`);
                }
                post.blog_status = payload.data.blog_status || 'scheduled';
                post.blog_scheduled_at = payload.data.blog_scheduled_at;
                if (post.blog_content) {
                    post.blog_content.publication_date = payload.data.blog_scheduled_at;
                }
                this.flashNote(post, 'Schedule saved.');
            } catch (error) {
                console.error('Failed to schedule blog post', error);
                alert(error instanceof Error ? error.message : 'Failed to schedule blog post');
            } finally {
                this.isGenerating = false;
            }
        },
        async generateAllDrafts() {
            if (this.isGenerating) return;
            this.isGenerating = true;
            try {
                const response = await fetch('/blog/batches/{{ batch.id }}/blog/generate-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                if (!response.ok) {
                    throw new Error(await response.text() || `Generate all failed (${response.status})`);
                }
                window.location.reload();
            } catch (error) {
                console.error('Failed to generate all blog drafts', error);
                alert(error instanceof Error ? error.message : 'Failed to generate all blog drafts');
            } finally {
                this.isGenerating = false;
            }
        },
        saveField(postId, field, value) {
            const body = {};
            body[field] = value;
            fetch('/blog/posts/' + postId + '/blog/content', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            }).then(resp => {
                if (!resp.ok) console.error('Failed to save blog field', field);
                const post = this.posts.find(p => p.id === postId);
                if (post && post.blog_content) {
                    post.blog_content[field] = value;
                    if (field === 'name' || field === 'title') {
                        post.blog_content.name = value;
                        post.blog_content.title = value;
                    }
                }
            });
        },
        async generateImage(post) {
            if (!post?.id || this.isGenerating || this.isBusy(post)) return;
            this.isGenerating = true;
            this.setBusy(post, 'image', 'Generating preview image...');
            try {
                const response = await fetch('/blog/posts/' + post.id + '/blog/image/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_prompt: post.blog_content?.image_prompt || '' }),
                });
                const payload = await this.readPayload(response);
                const errorMessage = payload?.detail || payload?.message;
                if (!response.ok || payload?.ok === false) {
                    throw new Error(errorMessage || `Image generation failed (${response.status})`);
                }
                post.blog_content = {
                    ...(post.blog_content || {}),
                    image_prompt: payload.data.image_prompt,
                    preview_image_url: payload.data.preview_image_url,
                    image_model: payload.data.image_model,
                    image_generated_at: new Date().toISOString(),
                };
                this.flashNote(post, 'Preview image generated.');
            } catch (error) {
                console.error('Failed to generate blog image', error);
                post.clientStatus = 'failed';
                post.clientNote = error instanceof Error ? error.message : 'Failed to generate blog image';
                alert(post.clientNote);
            } finally {
                if (post.clientStatus !== 'failed') {
                    this.clearBusy(post);
                } else {
                    post.busyAction = null;
                }
                this.isGenerating = false;
            }
        },
        async regenerateImage(post) {
            return this.generateImage(post);
        },
        async removeImage(post) {
            if (!post?.id || this.isGenerating || this.isBusy(post)) return;
            this.isGenerating = true;
            this.setBusy(post, 'image', 'Removing preview image...');
            try {
                const response = await fetch('/blog/posts/' + post.id + '/blog/content', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ preview_image_url: null, image_prompt: post.blog_content?.image_prompt || null }),
                });
                const payload = await this.readPayload(response);
                const errorMessage = payload?.detail || payload?.message;
                if (!response.ok || payload?.ok === false) {
                    throw new Error(errorMessage || `Image removal failed (${response.status})`);
                }
                post.blog_content = {
                    ...(post.blog_content || {}),
                    preview_image_url: null,
                };
                this.flashNote(post, 'Preview image removed.');
            } catch (error) {
                console.error('Failed to remove blog image', error);
                alert(error instanceof Error ? error.message : 'Failed to remove blog image');
            } finally {
                this.clearBusy(post);
                this.isGenerating = false;
            }
        },
    };
}
</script>
{% endif %}
