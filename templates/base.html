<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FLOW-FORGE UGC System{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%236750A4'/%3E%3Cpath d='M14 44V20h8v16h16v8H14zm18 0V20h8v16h10v8H32z' fill='white'/%3E%3C/svg%3E">
    {% block head_extra %}{% endblock %}
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/brand.css?v={{ static_version }}">
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>
    
    <style>
        /* Material Design 3 inspired colors */
        :root {
            --primary: #6750A4;
            --primary-container: #EADDFF;
            --on-primary: #FFFFFF;
            --on-primary-container: #21005D;
            --secondary: #625B71;
            --secondary-container: #E8DEF8;
            --surface: #FFFBFE;
            --surface-variant: #E7E0EC;
            --on-surface: #1C1B1F;
            --on-surface-variant: #49454F;
            --outline: #79747E;
            --error: #B3261E;
            --error-container: #F9DEDC;
        }
        
        /* Mobile menu toggle */
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="app-shell" hx-history-elt>
    <!-- Navigation -->
    <nav class="brand-nav" x-data="{ mobileMenuOpen: false }" x-init="$nextTick(() => $store.accountsHub?.bootstrap())">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex min-h-[5rem] items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <a href="/" class="brand-focus inline-flex items-center rounded-xl">
                        <img
                            src="/static/images/logo-Lippe-Lift_01.png"
                            alt="Lippe Lift Operations"
                            class="h-10 w-auto sm:h-12"
                            loading="lazy"
                        >
                    </a>
                    <div class="hidden lg:block">
                        <p class="font-brand-heading text-xs font-semibold uppercase tracking-[0.32em] text-[#006AAB]">Lippe Lift</p>
                        <p class="text-sm text-[#1C2740]/72">Operations</p>
                    </div>
                </div>
                
                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center gap-2">
                    <button
                        type="button"
                        @click="$store.accountsHub?.open()"
                        x-cloak
                        class="inline-flex items-center gap-3 rounded-full border border-gray-200 bg-gray-50 px-3 py-2 text-sm font-medium text-gray-700 transition hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                    >
                        <span class="flex items-center gap-1.5">
                            <span class="inline-flex items-center gap-1 rounded-full bg-white/80 px-2 py-1 text-[11px] font-semibold uppercase tracking-wide text-gray-600 ring-1 ring-gray-200">
                                <span class="inline-flex h-2 w-2 rounded-full" :class="$store.accountsHub?.providerDot('meta') || 'bg-amber-400'"></span>
                                Meta
                            </span>
                            <span class="inline-flex items-center gap-1 rounded-full bg-white/80 px-2 py-1 text-[11px] font-semibold uppercase tracking-wide text-gray-600 ring-1 ring-gray-200">
                                <span class="inline-flex h-2 w-2 rounded-full" :class="$store.accountsHub?.providerDot('tiktok') || 'bg-amber-400'"></span>
                                TikTok
                            </span>
                        </span>
                        <span x-text="$store.accountsHub?.desktopLabel() || 'Accounts'"></span>
                    </button>
                    <a href="/topics" class="brand-nav__link brand-focus rounded-full px-4 py-2 text-sm">Topics</a>
                    <a href="/batches" class="brand-nav__link brand-focus rounded-full px-4 py-2 text-sm">Batches</a>
                    <a href="/docs" class="brand-nav__link brand-focus rounded-full px-4 py-2 text-sm">API Docs</a>
                    <form method="post" action="/auth/logout" class="inline">
                        <button type="submit" class="text-gray-400 hover:text-red-600 px-3 py-2 rounded-md text-sm font-medium transition" title="Log out">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                            </svg>
                        </button>
                    </form>
                </div>
                
                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center">
                    <button
                        @click="mobileMenuOpen = !mobileMenuOpen"
                        type="button"
                        class="inline-flex items-center justify-center p-2 rounded-md text-gray-700 hover:text-purple-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-purple-500 transition"
                        aria-expanded="false"
                        aria-label="Toggle navigation menu"
                    >
                        <svg x-show="!mobileMenuOpen" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                        <svg x-show="mobileMenuOpen" x-cloak class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div x-show="mobileMenuOpen" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1" class="md:hidden border-t border-gray-200">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a
                    href="/topics"
                    class="block text-gray-700 hover:text-purple-700 hover:bg-purple-50 px-3 py-2 rounded-md text-base font-medium transition"
                    @click="mobileMenuOpen = false"
                >
                    Topics
                </a>
                <a
                    href="/batches"
                    class="block text-gray-700 hover:text-purple-700 hover:bg-purple-50 px-3 py-2 rounded-md text-base font-medium transition"
                    @click="mobileMenuOpen = false"
                >
                    Batches
                </a>
                <a
                    href="/docs"
                    class="block text-gray-700 hover:text-purple-700 hover:bg-purple-50 px-3 py-2 rounded-md text-base font-medium transition"
                    @click="mobileMenuOpen = false"
                >
                    API Docs
                </a>
                <button
                    type="button"
                    x-cloak
                    @click="mobileMenuOpen = false; $store.accountsHub?.open()"
                    class="flex w-full items-center gap-3 rounded-md px-3 py-2 text-left text-base font-medium text-gray-700 transition hover:bg-purple-50 hover:text-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500"
                >
                    <span class="flex items-center gap-1.5">
                        <span class="inline-flex h-2.5 w-2.5 rounded-full" :class="$store.accountsHub?.providerDot('meta') || 'bg-amber-400'"></span>
                        <span class="inline-flex h-2.5 w-2.5 rounded-full" :class="$store.accountsHub?.providerDot('tiktok') || 'bg-amber-400'"></span>
                    </span>
                    <span x-text="$store.accountsHub?.mobileLabel() || 'Accounts'"></span>
                </button>
                <form method="post" action="/auth/logout">
                    <button
                        type="submit"
                        class="flex w-full items-center gap-3 rounded-md px-3 py-2 text-left text-base font-medium text-gray-700 transition hover:bg-red-50 hover:text-red-700 focus:outline-none focus:ring-2 focus:ring-red-500"
                    >
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Log out
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8 lg:py-10">
        {% block content %}{% endblock %}
    </main>

    {% include "components/accounts_hub.html" %}

    <!-- Footer -->
    <footer class="brand-footer mt-12">
        <div class="max-w-7xl mx-auto px-4 py-5 sm:px-6 lg:px-8">
            <div class="flex flex-col gap-2 text-sm text-[#1C2740]/70 sm:flex-row sm:items-center sm:justify-between">
                <p>Lippe Lift Operations Hub</p>
                <a href="/health" class="brand-nav__link brand-focus rounded-md">System Health</a>
            </div>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
